workflows:
  flutter-app-workflow:
    name: Flutter App Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Analyze
        script: flutter analyze

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/**/outputs/**/*.apk
