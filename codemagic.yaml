workflows:
  flutter-app-workflow:
    name: Flutter App Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Go to Flutter project
        script: cd GalleryApp

      - name: Get dependencies
        script: |
          cd GalleryApp
          flutter pub get

      - name: Static analysis
        script: |
          cd GalleryApp
          flutter analyze

      - name: Run tests
        script: |
          cd GalleryApp
          flutter test

      - name: Build Android APK
        script: |
          cd GalleryApp
          flutter build apk --release

      - name: Build iOS
        script: |
          cd GalleryApp
          flutter build ios --release --no-codesign

    artifacts:
      - GalleryApp/build/**/outputs/apk/**/*.apk
      - GalleryApp/build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com
